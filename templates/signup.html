{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center py-5">
    <div class="col-md-8 col-lg-6">
        <div class="card shadow border-0 rounded-4">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <h2 class="fw-bold text-primary">Create an Account</h2>
                    <p class="text-muted">Join DataPilot AI to start scraping.</p>
                </div>
                
                <form method="POST" action="{{ url_for('auth.signup') }}">
                    <div class="mb-3">
                        <label for="name" class="form-label">Full Name</label>
                        <input type="text" class="form-control form-control-lg" id="name" name="name" required placeholder="John Doe">
                    </div>
                    
                    <div class="mb-3">
                        <label for="email" class="form-label">Email address</label>
                        <input type="email" class="form-control form-control-lg" id="email" name="email" required placeholder="name@example.com">
                    </div>

                    <div class="mb-3">
                        <label for="purpose" class="form-label">Purpose of Use</label>
                        <select class="form-select form-select-lg" id="purpose" name="purpose" required>
                            <option value="" disabled selected>Select an option...</option>
                            <option value="Research">Data Science Research</option>
                            <option value="Job Search">Tracking Job Listings</option>
                            <option value="Business">Business Intelligence</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    
                    <div class="mb-4">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" class="form-control form-control-lg" id="password" name="password" required placeholder="••••••••">
                    </div>
                    
                    <button type="submit" class="btn btn-primary btn-lg w-100 mb-3"><i class="bi bi-person-plus"></i> Sign Up</button>
                    
                    <div class="text-center">
                        <span class="text-muted">Already have an account?</span> <a href="{{ url_for('auth.login') }}" class="text-decoration-none fw-bold">Sign In</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
